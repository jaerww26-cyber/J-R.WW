<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>jaer.ww</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{

      height:100vh;
      width:100vw;

      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      background-color:black;

      position:relative;

      color:white;
    }

    /* FULL SCREEN BACKGROUND LOGO */

    body::before{

      content:"";

      position:absolute;
      inset:0;

      background-image:url("metalliclogo.png");

      background-repeat:no-repeat;

      background-position:center;

      background-size:120vh;

      opacity:0.38;

      filter:
      brightness(2)
      contrast(1.3);

      z-index:0;
    }

    /* DARK OVERLAY */

    body::after{

      content:"";

      position:absolute;
      inset:0;

      background:rgba(0,0,0,0.55);

      z-index:1;
    }

    /* PASSWORD BOX */

    .container{

      position:relative;
      z-index:2;

      width:90%;
      max-width:700px;

      padding:45px;

      border-radius:18px;

      background:rgba(0,0,0,0.28);

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);

      text-align:center;
    }

    h1{

      font-size:20px;
      font-weight:400;

      margin-bottom:30px;

      color:#f1f1f1;
    }

    .password-box{

      display:flex;
      gap:15px;
    }

    input{

      flex:1;

      padding:20px;

      border-radius:12px;

      border:1px solid rgba(255,255,255,0.12);

      background:rgba(255,255,255,0.04);

      color:white;

      font-size:16px;

      outline:none;
    }

    input::placeholder{
      color:#9a9a9a;
    }

    input:focus{

      border-color:rgba(255,255,255,0.35);
    }

    button{

      padding:20px 34px;

      border:none;

      border-radius:12px;

      background:white;

      color:black;

      font-size:15px;
      font-weight:bold;

      cursor:pointer;

      transition:0.2s;
    }

    button:hover{

      background:#d9d9d9;

      transform:scale(1.03);
    }

    .message{

      margin-top:16px;

      color:#ff6b6b;

      min-height:20px;

      font-size:14px;
    }

    /* MOBILE */

    @media(max-width:700px){

      .container{

        width:92%;

        padding:28px;
      }

      .password-box{

        flex-direction:column;
      }

      button{
        width:100%;
      }

      body::before{

        background-size:85vh;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>
      Enter the password to access the first drop
    </h1>

    <div class="password-box">

      <input
        type="password"
        id="passwordInput"
        placeholder="Enter password"
      >

      <button onclick="checkPassword()">
        Enter
      </button>

    </div>

    <div
      class="message"
      id="message">
    </div>

  </div>

  <script>

    function checkPassword(){

      const password =
      document.getElementById("passwordInput").value;

      const message =
      document.getElementById("message");

      const correctPassword = "jaer123";

      if(password === correctPassword){

        window.location.href = "home.html";

      }else{

        message.textContent =
        "Incorrect password. Please try again.";
      }
    }

  </script>

</body>
</html>
