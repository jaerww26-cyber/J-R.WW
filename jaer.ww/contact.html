<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | JÆR.WW</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    }

    body{
      min-height:100vh;

      background:
      radial-gradient(circle at center,
      rgba(255,255,255,0.08),
      transparent 35%),

      #050505;

      color:white;
    }

    header{
      padding:28px 50px;

      display:flex;

      justify-content:space-between;

      align-items:center;
    }

    .brand{
      color:white;

      text-decoration:none;

      font-size:32px;

      font-weight:900;

      letter-spacing:4px;

      text-shadow:0 0 18px rgba(255,255,255,0.45);
    }

    nav{
      display:flex;

      gap:25px;

      align-items:center;
    }

    nav a{
      color:white;

      text-decoration:none;

      font-weight:900;

      text-transform:uppercase;

      font-size:14px;
    }

    .contact-box{

      width:90%;

      max-width:700px;

      margin:80px auto;

      padding:40px;

      background:rgba(255,255,255,0.04);

      border:2px solid white;

      box-shadow:10px 10px 0 rgba(255,255,255,0.18);
    }

    h1{
      font-size:60px;

      margin-bottom:20px;

      text-transform:uppercase;

      text-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    p{
      color:#bdbdbd;

      margin-bottom:35px;

      line-height:1.7;
    }

    label{
      display:block;

      margin-bottom:10px;

      font-size:12px;

      letter-spacing:3px;

      text-transform:uppercase;

      color:#888;
    }

    input,
    textarea{

      width:100%;

      padding:16px;

      margin-bottom:22px;

      background:#0b0b0b;

      border:1px solid rgba(255,255,255,0.2);

      color:white;

      outline:none;
    }

    textarea{
      min-height:180px;

      resize:none;
    }

    button{

      width:100%;

      padding:20px;

      background:white;

      color:black;

      border:none;

      font-size:15px;

      font-weight:900;

      text-transform:uppercase;

      cursor:pointer;

      box-shadow:8px 8px 0 rgba(255,255,255,0.2);
    }

    button:hover{
      background:#dcdcdc;
    }

  </style>

</head>

<body>

  <header>

    <a href="home.html" class="brand">
      JÆR.WW
    </a>

    <nav>

      <a href="home.html">
        Home
      </a>

      <a href="products.html">
        Shop
      </a>

    </nav>

  </header>

  <section class="contact-box">

    <h1>
      Contact
    </h1>

    <p>
      For questions about orders,
      shipping, sizing, or collaborations,
      contact JÆR.WW directly.
    </p>

    <form
      action="https://formsubmit.co/jaer.ww26@gmail.com"
      method="POST"
    >

      <label>
        Name
      </label>

      <input
        type="text"
        name="Name"
        required
      >

      <label>
        Email
      </label>

      <input
        type="email"
        name="Email"
        required
      >

      <label>
        Message
      </label>

      <textarea
        name="Message"
        required
      ></textarea>

      <input
        type="hidden"
        name="_subject"
        value="New Contact Message - JÆR.WW"
      >

      <input
        type="hidden"
        name="_captcha"
        value="false"
      >

      <input
        type="hidden"
        name="_template"
        value="table"
      >

      <input
        type="hidden"
        name="_next"
        value="thankyou.html"
      >

      <button type="submit">
        Send Message
      </button>

    </form>

  </section>

</body>
</html>
