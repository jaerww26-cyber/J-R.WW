<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WW Cap 1 | JÆR.WW</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:
      "Helvetica Neue",
      Helvetica,
      Arial,
      sans-serif;
    }

    body{
      min-height:100vh;

      background:
      radial-gradient(circle at center,
      rgba(255,255,255,0.08),
      transparent 35%),

      #050505;

      color:white;

      overflow-x:hidden;
    }

    header{
      padding:30px 50px;

      display:flex;

      justify-content:space-between;

      align-items:center;
    }

    .brand{
      font-size:34px;

      font-weight:900;

      letter-spacing:4px;

      text-shadow:
      0 0 18px rgba(255,255,255,0.45);

      color:white;

      text-decoration:none;
    }

    .back{
      color:white;

      text-decoration:none;

      font-weight:bold;

      text-transform:uppercase;
    }

    .product-page{

      width:88%;

      min-height:80vh;

      margin:0 auto;

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:70px;

      align-items:center;

      justify-content:center;
    }

    .image-box{
      height:620px;

      border:3px solid white;

      background:
      rgba(255,255,255,0.04);

      box-shadow:
      12px 12px 0 rgba(255,255,255,0.18);

      display:flex;

      align-items:center;

      justify-content:center;

      font-size:28px;

      font-weight:900;

      text-transform:uppercase;

      animation:floatImage 4s ease-in-out infinite;
    }

    .details{
      animation:floatDetails 4s ease-in-out infinite;
    }

    h1{
      font-size:76px;

      line-height:0.95;

      text-transform:uppercase;

      margin-bottom:24px;

      text-shadow:
      0 0 20px rgba(255,255,255,0.35);
    }

    .price{
      font-size:48px;

      font-weight:900;

      margin-bottom:32px;
    }

    .description{
      max-width:560px;

      font-size:20px;

      line-height:1.6;

      color:#d6d6d6;

      border-left:4px solid white;

      padding-left:24px;

      margin-bottom:38px;
    }

    .option-title{
      font-size:18px;

      text-transform:uppercase;

      letter-spacing:2px;

      margin-bottom:14px;

      color:#aaa;
    }

    .options{
      display:flex;

      gap:14px;

      margin-bottom:36px;
    }

    .option{
      padding:14px 22px;

      border:2px solid white;

      background:#050505;

      color:white;

      font-weight:bold;
    }

    .cart{
      width:100%;

      max-width:520px;

      padding:22px;

      background:white;

      color:black;

      border:3px solid black;

      font-size:24px;

      font-weight:900;

      text-transform:uppercase;

      cursor:pointer;

      box-shadow:
      10px 10px 0 rgba(255,255,255,0.25);
    }

    .cart:hover{
      background:#dcdcdc;
    }

    @keyframes floatImage{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-16px);
      }
    }

    @keyframes floatDetails{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(12px);
      }
    }

    @media(max-width:900px){

      .product-page{
        grid-template-columns:1fr;
      }

      h1{
        font-size:48px;
      }

      .image-box{
        height:420px;
      }
    }

  </style>
</head>

<body>

  <header>

    <a href="home.html" class="brand">
      JÆR.WW
    </a>

    <a href="products.html" class="back">
      Back To Shop
    </a>

  </header>

  <main class="product-page">

    <section class="image-box">
      Product Image
    </section>

    <section class="details">

      <h1>
        WW CAP 1
      </h1>

      <div class="price">
        £40
      </div>

      <p class="description">
        First official JÆR.WW cap.
        Minimal black design with
        militant-inspired energy and
        signature underground aesthetic.
      </p>

      <div class="option-title">
        Size
      </div>

      <div class="options">
        <div class="option">
          One Size
        </div>
      </div>

      <button class="cart" onclick="addCap1ToCart()">
        Add To Cart
      </button>

    </section>

  </main>

  <script>

    function addCap1ToCart(){

      let cart =
      JSON.parse(localStorage.getItem("cart")) || [];

      cart.push({

        name:"WW Cap 1",

        price:40,

        size:"One Size"

      });

      localStorage.setItem(
        "cart",
        JSON.stringify(cart)
      );

    }

  </script>

</body>
</html>
